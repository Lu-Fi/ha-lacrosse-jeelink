name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  hassfest:
    name: Hassfest (Home Assistant manifest/translation check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # 'brands' erfordert einen Eintrag im home-assistant/brands Repo -
          # fuer Custom-Repositories nicht noetig (Integration liefert ihr
          # Brand-Icon selbst mit, HA >= 2026.3)
          ignore: brands
